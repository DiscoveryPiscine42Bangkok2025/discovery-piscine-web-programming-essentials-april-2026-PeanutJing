<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <style>
                html, body {
            height: 100%;
            margin: 0;
        }

        table {
            width: 100vw;
            height: 100vh;
            border-collapse: collapse;
            table-layout: fixed; 
        }

        td {
            text-align: center;
            font-size: 10vw; 
        }

        .t1 {background-color: purple;}
        .t2 {background-color: yellow;}
    </style>
</head>
<body>
    <table border="1">
        <tr>
            <td class="t1">Mama</td>
            <td class="t2">Mia</td>
        </tr>
    </table>
</body>
</html>
