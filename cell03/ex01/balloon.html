<!DOCTYPE html>
<html lang="en">
<head>
</head>
<body>
    <div id="balloon" style="border-radius: 100%; background-color: red; width: 200px; height: 200px;">

    </div>
</body>
<script>
    const dd = document.getElementById("balloon")
    let cw = dd.offsetWidth
    let ch = dd.offsetHeight
    dd.onclick = function() {
        const dcw = 200
        const dch = 200
        
        cw += 10;
        ch += 10;
        
        dd.style.width = cw + "px";
        dd.style.height = ch + "px";

        if (ch > 420 || cw > 420) {
            cw = dcw
            ch = dch

            dd.style.width = 0
            dd.style.height = 0
            setTimeout(() => {
                dd.style.width = dcw + "px"
                dd.style.height = dch + "px"
            }, 2000);
        }
    };

    dd.onmouseleave = function() {
        if (cw - 5 >= 200 && ch - 5 >= 200) {
            cw -= 5
            ch -= 5
            dd.style.height = ch + "px"
            dd.style.width = cw + "px"
        }
    }
</script>
</html>
